<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Paint</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Space Mono', monospace;
      color: #fff;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #fff;
      opacity: 0.85;
    }

    #placeholder {
      width: 640px;
      max-width: 100vw;
      aspect-ratio: 4/3;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }

    #startBtn {
      padding: 10px 32px;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.1em;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid #444;
      background: #1e1e1e;
      color: #fff;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
    }
    #startBtn:hover { background: #2a2a2a; border-color: #666; }

    #videoWrapper {
      display: none;
      position: relative;
      width: 640px;
      max-width: 100vw;
      border-radius: 4px;
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      border: 1px solid #222;
    }

    video, #overlayCanvas, #drawCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    video { transform: scaleX(-1); }
    #drawCanvas { mix-blend-mode: screen; }
    #overlayCanvas { pointer-events: none; }

    #controls {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 640px;
      max-width: 100vw;
    }

    .colorBtn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
    }
    .colorBtn.active {
      border-color: #fff;
      transform: scale(1.2);
    }
    .colorBtn.active::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .eraserBtn {
      border-radius: 4px !important;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: #aaa;
    }

    #clearBtn, #saveBtn {
      padding: 7px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      border-radius: 3px;
      cursor: pointer;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      text-transform: uppercase;
      transition: background 0.12s;
    }
    #clearBtn:hover, #saveBtn:hover { background: #252525; }

    #brushWrap {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #666;
      margin-left: auto;
    }
    #brushRange {
      width: 70px;
      accent-color: #fff;
    }

    #gestureHint {
      font-size: 11px;
      color: #444;
      margin-top: 10px;
      letter-spacing: 0.05em;
    }

    #status {
      font-size: 11px;
      color: #555;
      margin-top: 5px;
      min-height: 18px;
      letter-spacing: 0.05em;
    }

    /* Gesture indicator overlay */
    #gestureIndicator {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 1px solid #333;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    #gestureIndicator.visible { opacity: 1; }

    /* Color cycle overlay */
    #colorCycle {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 100;
    }
    #colorCycle.visible { opacity: 1; }
    .ccDot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
    }
    .ccDot.active { border-color: #fff; transform: scale(1.3); }
  </style>
</head>
<body>

  <h1>Virtual Paint</h1>

  <div id="placeholder">
    <p style="font-size:13px;color:#555;letter-spacing:0.08em;">DRAW WITH YOUR HAND</p>
    <button id="startBtn">Enable Camera</button>
    <p style="font-size:11px;color:#333;letter-spacing:0.05em;">Requires webcam access</p>
  </div>

  <div id="videoWrapper">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="drawCanvas"></canvas>
    <canvas id="overlayCanvas"></canvas>
  </div>

  <div id="controls">
    <button class="colorBtn active" data-color="#3b82f6" style="background:#3b82f6;" title="Blue"></button>
    <button class="colorBtn" data-color="#22c55e" style="background:#22c55e;" title="Green"></button>
    <button class="colorBtn" data-color="#ef4444" style="background:#ef4444;" title="Red"></button>
    <button class="colorBtn" data-color="#facc15" style="background:#facc15;" title="Yellow"></button>
    <button class="colorBtn" data-color="#f97316" style="background:#f97316;" title="Orange"></button>
    <button class="colorBtn" data-color="#a855f7" style="background:#a855f7;" title="Purple"></button>
    <button class="colorBtn" data-color="#ffffff" style="background:#ffffff;" title="White"></button>
    <button class="colorBtn eraserBtn" data-color="#000" data-eraser="true" style="background:#2a2a2a;color:#aaa;" title="Eraser">E</button>
    <button id="clearBtn">Clear</button>
    <button id="saveBtn">Save</button>
    <div id="brushWrap">
      <span>SIZE</span>
      <input type="range" id="brushRange" min="2" max="40" value="7" step="1">
      <span id="brushVal">7</span>
    </div>
  </div>

  <p id="gestureHint">☝ 1 прст = цртај &nbsp;|&nbsp; ✌ 2 прста = пауза &nbsp;|&nbsp; 🤟 3 прста = промени боју</p>
  <p id="status"></p>

  <div id="gestureIndicator"></div>
  <div id="colorCycle"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script src="app.js"></script>
</body>
</html>
